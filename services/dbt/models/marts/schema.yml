version: 2

models:
  - name: customer_analytics
    description: Comprehensive customer analytics including lifetime value, order patterns, and segmentation
    columns:
      - name: customer_id
        description: Unique customer identifier
        tests:
          - unique
          - not_null
      - name: company_name
        description: Customer company name
      - name: lifetime_revenue
        description: Total revenue generated by this customer
      - name: total_orders
        description: Number of orders placed
      - name: customer_segment
        description: Customer value segment (High/Medium/Low Value)
      - name: customer_status
        description: Current status (Active/At Risk/Churned)
      - name: late_shipment_rate_pct
        description: Percentage of orders that shipped late

  - name: sales_summary
    description: Daily sales summary with revenue metrics and trends
    columns:
      - name: order_date
        description: Date of sales
        tests:
          - not_null
      - name: net_revenue
        description: Net revenue after discounts
      - name: total_orders
        description: Number of orders placed
      - name: unique_customers
        description: Number of unique customers
      - name: month_to_date_revenue
        description: Running total of revenue for the month
      - name: year_to_date_revenue
        description: Running total of revenue for the year

  - name: product_performance
    description: Product performance metrics including sales, revenue, and inventory status
    columns:
      - name: product_id
        description: Unique product identifier
        tests:
          - unique
          - not_null
      - name: product_name
        description: Product name
      - name: net_revenue
        description: Total net revenue from this product
      - name: total_units_sold
        description: Total units sold
      - name: revenue_rank
        description: Rank by revenue (1 = highest)
      - name: revenue_contribution_pct
        description: Percentage contribution to total revenue
      - name: product_lifecycle_stage
        description: Current lifecycle stage (Active/Declining/Inactive)

  - name: employee_performance
    description: Employee performance metrics including sales and service quality
    columns:
      - name: employee_id
        description: Unique employee identifier
        tests:
          - unique
          - not_null
      - name: full_name
        description: Employee full name
      - name: total_revenue
        description: Total revenue generated by employee
      - name: total_orders
        description: Number of orders processed
      - name: revenue_rank
        description: Rank by revenue (1 = highest)
      - name: late_shipment_rate_pct
        description: Percentage of orders that shipped late
      - name: manager_name
        description: Name of employee's manager
