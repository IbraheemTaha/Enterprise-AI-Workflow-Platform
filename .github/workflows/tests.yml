name: Service Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: "FastAPI service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run pytest
        run: pytest tests/ -v

  langchain-tests:
    name: "LangChain service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/langchain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/langchain/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest tests/ -v

  gradio-tests:
    name: "Gradio UI"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gradio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/gradio/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest tests/ -v

  streamlit-tests:
    name: "Streamlit UI"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/streamlit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/streamlit/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest tests/ -v

  mlflow-tests:
    name: "MLflow service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mlflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/mlflow/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml
      - name: Run pytest
        run: pytest tests/ -v

  airflow-tests:
    name: "Airflow DAGs"
    runs-on: ubuntu-latest
    env:
      AIRFLOW_HOME: ${{ github.workspace }}/airflow_home
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__UNIT_TEST_MODE: "True"
    defaults:
      run:
        working-directory: services/airflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Airflow and DAG dependencies
        run: |
          python -m pip install --upgrade pip
          AIRFLOW_VERSION=2.10.3
          PYTHON_VERSION="$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"
          pip install pytest
      - name: Run DAG integrity tests
        run: pytest tests/ -v

  dbt-tests:
    name: "dbt project"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dbt_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DBT_POSTGRES_HOST: localhost
      DBT_POSTGRES_PORT: "5432"
      DBT_POSTGRES_USER: postgres
      DBT_POSTGRES_PASSWORD: postgres
      DBT_POSTGRES_DB: dbt_db
      DBT_POSTGRES_SCHEMA: dbt
      DBT_THREADS: "4"
      DBT_SEARCH_PATH: "dbt,public"
    defaults:
      run:
        working-directory: services/dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dbt-postgres and pytest
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-postgres==1.9.0" pytest pyyaml
      - name: Run project structure tests
        run: pytest tests/ -v
      - name: dbt deps + parse
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/services/dbt
        run: |
          dbt deps || true
          dbt parse --no-partial-parse
      - name: dbt debug
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/services/dbt
        run: dbt debug

  compose-validate:
    name: "Docker Compose config"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from example
        run: cp .env.example .env || echo "# empty" > .env
      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  all-tests-passed:
    name: "All tests passed"
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - langchain-tests
      - gradio-tests
      - streamlit-tests
      - mlflow-tests
      - airflow-tests
      - dbt-tests
      - compose-validate
    steps:
      - name: Report success
        run: echo "✅ All service tests passed"
