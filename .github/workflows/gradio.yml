name: Gradio

on:
  push:
    branches: [ main, dev, master, develop ]
  pull_request:
    branches: [ main, dev, master, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradio tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gradio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/gradio/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest tests/ -v
